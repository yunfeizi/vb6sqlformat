apiVersion: apps/v1
kind: Deployment
metadata:
  name: vb6-sql-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vb6-sql
  template:
    metadata:
      labels:
        app: vb6-sql
    spec:
      containers:
      - name: vb6-sql-app
        # 镜像名必须和podman构建名称完全一致
        image: localhost/vb6-sql-format:local
        # 关键：禁止去外网拉取镜像，只用本地导入镜像
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
---
# NodePort服务，本地可访问
apiVersion: v1
kind: Service
metadata:
  name: vb6-sql-svc
spec:
  type: NodePort
  selector:
    app: vb6-sql
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30030